<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sahabatku Group | Testimoni</title>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
  <script src="https://unpkg.com/lucide@latest"></script>

  <style>
    :root {
      --primary: #0080f7;
      --primary-grad: linear-gradient(135deg, #0080f7 0%, #00c6ff 100%);
      --bg: #f8fbff;
      --card-bg: #ffffff;
      --text: #0f172a;
      --text-soft: #64748b;
      --gold: #facc15;
      --radius-lg: 24px;
      --card-width: 320px;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Plus Jakarta Sans', sans-serif;
      background: linear-gradient(135deg, var(--bg) 0%, #e3f2fd 100%);
      color: var(--text);
      min-height: 100vh;
      padding-bottom: 50px;
    }

    /* Floating Navigation */
    .floating-nav {
      position: fixed; top: 20px; right: 20px; z-index: 999;
      display: flex; align-items: center; gap: 10px;
      background: white; padding: 8px 18px; border-radius: 50px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.1);
      text-decoration: none; transition: 0.3s;
    }

    /* Main Container */
    .wrapper { max-width: 500px; margin: 80px auto 0; padding: 0 20px; }
    
    .card {
      background: var(--card-bg); border-radius: var(--radius-lg);
      padding: 40px 30px; box-shadow: 0 40px 100px -20px rgba(0,0,0,0.08);
      margin-bottom: 30px;
    }

    .title { text-align: center; font-size: 1.8rem; font-weight: 800; background: var(--primary-grad); -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin-bottom: 10px; }
    .subtitle { text-align: center; color: var(--text-soft); font-size: 0.9rem; margin-bottom: 35px; }

    /* Form Styling */
    .input-group { margin-bottom: 20px; }
    label { display: block; font-weight: 700; font-size: 0.85rem; color: var(--text-soft); margin-bottom: 8px; }
    input[type="text"], textarea {
      width: 100%; padding: 15px; border: 2px solid #f1f5f9;
      border-radius: 12px; background: #f8fafc; font-family: inherit; transition: 0.3s;
    }
    input:focus, textarea:focus { border-color: var(--primary); outline: none; background: white; }

    /* Rating Stars */
    .rating-flex { display: flex; flex-direction: row-reverse; justify-content: center; gap: 5px; margin: 10px 0; }
    .rating-flex input { display: none; }
    .rating-flex label { font-size: 2.5rem; color: #e2e8f0; cursor: pointer; transition: 0.2s; margin: 0; }
    .rating-flex label:hover, .rating-flex label:hover ~ label, .rating-flex input:checked ~ label { color: var(--gold); }

    /* Radio Selection */
    .choice-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 5px; }
    .choice-grid input { display: none; }
    .choice-grid label {
      padding: 12px; background: #f1f5f9; border-radius: 10px; text-align: center;
      cursor: pointer; font-weight: 600; font-size: 0.8rem; transition: 0.3s;
    }
    .choice-grid input:checked + label { background: var(--primary); color: white; }

    .btn-submit {
      width: 100%; padding: 18px; border-radius: 12px; border: none;
      background: var(--primary-grad); color: white; font-weight: 800;
      cursor: pointer; margin-top: 20px; box-shadow: 0 10px 20px rgba(0,128,247,0.2);
    }

    /* Testimonials Slider */
    .testimonials-section { overflow: hidden; padding: 20px 0; }
    .carousel-track { display: flex; gap: 20px; width: max-content; animation: scroll 80s linear infinite; }
    .carousel-track:hover { animation-play-state: paused; }
    
    .testi-item {
      background: white; width: var(--card-width); padding: 25px;
      border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.05);
      border: 1px solid #f1f5f9; flex-shrink: 0;
    }

    @keyframes scroll { from { transform: translateX(0); } to { transform: translateX(-50%); } }

    /* Modals */
    .modal-overlay {
      position: fixed; inset: 0; background: rgba(15, 23, 42, 0.9);
      backdrop-filter: blur(8px); z-index: 10000;
      display: flex; justify-content: center; align-items: center; padding: 20px;
    }
    .modal-card { background: white; padding: 40px; border-radius: 30px; text-align: center; max-width: 400px; }
  </style>
</head>
<body>

<!-- Ganti link href dengan URL website Anda -->
<a href="https://sahabatkugroup.github.io/websitesahabatkudelivery/" class="floating-nav">
  <div style="width:32px; height:32px; border-radius:50%; overflow:hidden; display:flex; align-items:center; justify-content:center; background:#fff; border: 1px solid #f1f5f9;">
    <!-- Tambahkan URL gambar logo Anda di src -->
    <img src="https://i.ibb.co.com/Lhg1Z2GW/Sahabatku-2.png/logo.png" alt="Logo" style="width:100%; height:100%; object-fit:cover;">
  </div>
  <span style="font-weight:700; color:var(--primary); font-size:0.75rem;">KUNJUNGU WEB KAMI</span>
</a>

<div class="modal-overlay" id="welcomePop">
  <div class="modal-card">
    <!-- Kontainer Gambar -->
    <div style="background:var(--primary-grad); width:70px; height:70px; border-radius:20px; margin:0 auto 20px; display:flex; align-items:center; justify-content:center; color:white; overflow:hidden;">
      <!-- GANTI URL DI BAWAH DENGAN LINK LOGO ANDA -->
      <img src="https://i.ibb.co.com/Lhg1Z2GW/Sahabatku-2.png/logo.png" alt="Sahabatku Logo" style="width:100%; height:100%; object-fit:cover;">
    </div>
    
    <h2>Halo Sahabat!</h2>
    <p style="margin:15px 0 25px; color:var(--text-soft);">Terimakasih sudah memilih layanan kami. Penilaian Anda sangat berarti bagi perkembangan kami!</p>
    <button class="btn-submit" onclick="closePop()">MULAI REVIEW</button>
  </div>
</div>

<div class="wrapper">
  <div class="card">
    <h1 class="title">Feedback Pelanggan</h1>
    <p class="subtitle">Pengalaman Anda adalah kualitas layanan kami</p>
    
    <form id="feedbackForm">
      <div class="input-group">
        <label>👤 Nama Lengkap</label>
        <input type="text" id="fullname" placeholder="Contoh: Agus Maryono" required>
      </div>

      <div class="input-group">
        <label>🛵 Nama Kurir (Opsional)</label>
        <input type="text" id="courier" placeholder="Nama Kurir yang mengantar...">
      </div>

      <div class="input-group">
        <label style="text-align:center;">⭐ Berikan Rating Layanan</label>
        <div class="rating-flex">
          <input type="radio" id="s5" name="rating" value="5" required><label for="s5">★</label>
          <input type="radio" id="s4" name="rating" value="4"><label for="s4">★</label>
          <input type="radio" id="s3" name="rating" value="3"><label for="s3">★</label>
          <input type="radio" id="s2" name="rating" value="2"><label for="s2">★</label>
          <input type="radio" id="s1" name="rating" value="1"><label for="s1">★</label>
        </div>
      </div>

      <div class="input-group">
        <label>🛵 Sikap Kurir</label>
        <div class="choice-grid">
          <input type="radio" id="c-yes" name="attitude" value="Sangat Ramah" required>
          <label for="c-yes">😊 Ramah</label>
          <input type="radio" id="c-no" name="attitude" value="Kurang Ramah">
          <label for="c-no">😕 Kurang</label>
        </div>
      </div>

      <div class="input-group">
        <label>⚡ Kecepatan Kirim</label>
        <div class="choice-grid">
          <input type="radio" id="f-fast" name="speed" value="Sangat Cepat" required>
          <label for="f-fast">🚀 Cepat</label>
          <input type="radio" id="f-slow" name="speed" value="Standar">
          <label for="f-slow">⏱️ Standar</label>
        </div>
      </div>

      <div class="input-group">
        <label>💬 Pesan & Kesan</label>
        <textarea id="comments" rows="3" placeholder="Sampaikan kritik atau saran anda..." required></textarea>
      </div>

      <button type="submit" class="btn-submit">KIRIM TESTIMONI ✨</button>
    </form>
  </div>

  <h3 style="text-align:center; margin-bottom:20px;">Review Terbaru Sahabat</h3>
  <div class="testimonials-section">
    <div class="carousel-track" id="testiTrack">
      <!-- Data dari Firebase masuk ke sini -->
    </div>
  </div>
</div>

<!-- Success Modal -->
<div class="modal-overlay" id="successModal" style="display:none;">
  <div class="modal-card">
    <div style="background:#10b981; width:70px; height:70px; border-radius:50%; margin:0 auto 20px; display:flex; align-items:center; justify-content:center; color:white;">
      <i data-lucide="check" size="35"></i>
    </div>
    <h2>Terima Kasih! 🎉</h2>
    <p style="margin:15px 0 25px; color:var(--text-soft);">Review Anda sangat berarti bagi kami. Semoga sehat selalu!</p>
    <button class="btn-submit" onclick="location.reload()" style="background:#10b981;">TUTUP</button>
  </div>
</div>

<script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>

<script>
  lucide.createIcons();

  const firebaseConfig = {
    apiKey: "AIzaSyCtva8TeL40-WotK4kFL_vL8uUXL3GDfww",
    authDomain: "sahabatkuu-bisa.firebaseapp.com",
    databaseURL: "https://sahabatkuu-bisa-default-rtdb.asia-southeast1.firebasedatabase.app",
    projectId: "sahabatkuu-bisa",
    storageBucket: "sahabatkuu-bisa.firebasestorage.app",
    messagingSenderId: "315555564115",
    appId: "1:315555564115:web:56f46dbceb8c154589d4a6"
  };

  firebase.initializeApp(firebaseConfig);
  const db = firebase.database();

  function closePop() { document.getElementById('welcomePop').style.display = 'none'; }

  // Simpan ke Firebase
  // Simpan ke Firebase
  document.getElementById('feedbackForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      
      // Ambil tombol submit untuk dinonaktifkan sementara
      const submitBtn = e.target.querySelector('button[type="submit"]');
      if (submitBtn) submitBtn.disabled = true;
  
      const data = {
          fullname: document.getElementById('fullname').value,
          courierName: document.getElementById('courier').value || 'Sahabat Kurir',
          rating: document.querySelector('input[name="rating"]:checked').value,
          attitude: document.querySelector('input[name="attitude"]:checked').value,
          speed: document.querySelector('input[name="speed"]:checked').value,
          comments: document.getElementById('comments').value,
          timestamp: Date.now(),
          isPublished: false 
      };
  
      try {
          await db.ref('testimoni').push(data);
          document.getElementById('successModal').style.display = 'flex';
          e.target.reset(); // Mengosongkan form setelah berhasil
      } catch (err) {
          console.error(err);
          alert("Terjadi kesalahan, coba lagi.");
      } finally {
          // Hidupkan kembali tombol setelah proses selesai
          if (submitBtn) submitBtn.disabled = false;
      }
  });

  // Load Slider (Ambil 10 data terakhir yang dipublish)
  db.ref('testimoni').orderByChild('isPublished').equalTo(true).limitToLast(10).on('value', snap => {
      const track = document.getElementById('testiTrack');
      
      // PENTING: Bersihkan kontainer agar tidak double saat ada update data
      track.innerHTML = ''; 
      
      if(!snap.exists()) {
          track.innerHTML = '<p style="text-align:center; width:100%;">Belum ada ulasan.</p>';
          return;
      }
      
      // Ambil data dan balik urutannya (terbaru di depan)
      const dataObj = snap.val();
      const reviews = Object.keys(dataObj).map(key => dataObj[key]).reverse();
      
      // Gandakan data untuk efek seamless infinite scroll
      const looped = [...reviews, ...reviews, ...reviews]; 
  
      looped.forEach(item => {
        const card = document.createElement('div');
        card.className = 'testi-item';
        card.innerHTML = `
          <div style="display:flex; justify-content:space-between; margin-bottom:10px;">
            <span style="font-weight:800; color:var(--primary);">${item.fullname}</span>
            <span style="color:var(--gold);">${'★'.repeat(item.rating)}</span>
          </div>
          <p style="font-size:0.9rem; color:var(--text); line-height:1.5; font-style:italic;">"${item.comments}"</p>
          
          <!-- Bagian bawah yang diubah: Memunculkan Speed dan Attitude -->
          <div style="margin-top:15px; padding-top:10px; border-top:1px solid #f1f5f9; font-size:0.75rem; color:var(--text-soft); display: flex; gap: 10px;">
            <span>📦 Kecepatan: <strong>${item.speed || '-'}</strong></span>
            <span>🤝 Sikap: <strong>${item.attitude || '-'}</strong></span>
          </div>
        `;
        track.appendChild(card);
      });
  });
</script>

</body>
</html>
